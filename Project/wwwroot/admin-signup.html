<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Sign Up - SkillYouth</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header>
        <nav>
            <div class="logo">
                🎓 <span>Skill</span>Youth
            </div>
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="nav-links" id="nav-links">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="courses.html">Courses</a></li>
                    <li><a href="login.html">Login</a></li>
                    <li><a href="signup.html">Sign Up</a></li>
                </ul>
                <div class="nav-buttons">
                    <button id="admin-btn" class="modern-btn primary">Admin</button>
                    <button id="theme-toggle" class="modern-btn outline">Toggle Theme</button>
                </div>
            </div>
        </nav>
    </header>


    <!-- ADMIN SIGNUP SECTION -->
    <section class="login-section">

        <div class="login-card">

            <h1>Admin Sign Up</h1>

            <p class="subtitle">
                Create an admin account
            </p>

            <form id="admin-signup-form">

                <div class="input-box">
                    <label for="admin-name">Full Name</label>
                    <input type="text" id="admin-name" placeholder="Enter full name" required>
                </div>

                <div class="input-box">
                    <label for="admin-email">Email</label>
                    <input type="email" id="admin-email" placeholder="Enter email" required>
                </div>

                <div class="input-box">
                    <label for="admin-password">Password</label>
                    <input type="password" id="admin-password" placeholder="Enter password" required>
                </div>

                <button type="submit" class="login-btn" id="loginbtn">
                    Create Admin
                </button>

            </form>

            <p id="error-message"></p>

            <p class="signup-text">
                Already an admin?
                <a href="admin-login.html">Login here</a>
            </p>

        </div>

    </section>


    <footer>
        <p>&copy; 2026 SkillYouth. All rights reserved.</p>
    </footer>


    <script src="js/theme.js"></script>
    <script src="js/SignUpAdmin.js"></script>

    <script>
        const isAdmin = sessionStorage.getItem("adminAccessGranted");

        if (isAdmin !== "true") {
            alert("Unauthorized access. Please login first.");
            window.location.href = "admin-login.html";
        }
    </script>
    <script>
        const hamburger = document.getElementById('hamburger');
        const navLinks = document.getElementById('nav-links');

        hamburger.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });
    </script>

</body>

</html>
