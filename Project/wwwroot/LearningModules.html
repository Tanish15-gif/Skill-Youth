<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Player - SkillYouth</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/monokai-sublime.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>

<body>
    <header>
        <nav>
            <div class="logo">
                🎓 <span>Skill</span>Youth
            </div>
            <ul>
                <li><a href="dashboard.html" class="btn">Back to Dashboard</a></li>
            </ul>
            <button id="theme-toggle">Toggle Theme</button>
        </nav>
    </header>

    <main class="player-main">
        <div class="player-container">

            <aside class="lesson-sidebar">
                <h3 id="sidebar-course-title">Course Syllabus</h3>
                <ul id="lesson-list">
                    <li>Loading lessons...</li>
                </ul>
            </aside>

            <section class="lesson-content ql-editor">
                <div class="lesson-header">
                    <img id="lesson-header-img" src="" alt="Lesson Header" style="display: none;">
                </div>

                <h1 id="lesson-title">No Lesson's For this Chapter yet.</h1>

                <div id="lesson-body">
                </div>
                <div class="lesson-footer">
                    <button id="mark-complete-btn" class="complete-btn" onclick="markLessonComplete()">
                        <span class="btn-text">Mark as Complete</span>
                    </button>
                </div>
            </section>

        </div>
    </main>

    <script src="js/theme.js"></script>
    <script src="js/LessonDisplay.js"></script>
</body>

</html>
