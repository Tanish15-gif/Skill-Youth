<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - SkillYouth</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header>
        <nav>
            <div class="logo">
                🎓 <span>Skill</span>Youth
            </div>
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="nav-links" id="nav-links">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="courses.html">Courses</a></li>
                    <li><a href="login.html">Login</a></li>
                    <li><a href="signup.html">Sign Up</a></li>
                </ul>
                <div class="nav-buttons">
                    <button id="admin-btn" class="modern-btn primary">Admin</button>
                    <button id="theme-toggle" class="modern-btn outline">Toggle Theme</button>
                </div>
            </div>
        </nav>
    </header>


    <section class="login-section">

        <div class="login-card">

            <h1>Admin Login</h1>
            <p class="subtitle">
                Access dashboard and manage the system
            </p>

            <form id="admin-login-form">

                <div class="input-box">
                    <label for="admin-email">Email</label>
                    <input type="email" id="admin-email" placeholder="Enter admin email" required>
                </div>

                <div class="input-box">
                    <label for="admin-password">Password</label>
                    <input type="password" id="admin-password" placeholder="Enter password" required>
                </div>

                <button type="submit" class="login-btn" id="loginbtn">
                    Admin Login
                </button>

            </form>

            <p id="error-message" class="error-text"></p>

            <p class="signup-text">
                Back to
                <a href="login.html">User Login</a>
            </p>

        </div>

    </section>


    <footer>
        <p>&copy; 2026 SkillYouth. All rights reserved.</p>
    </footer>


    <script src="js/theme.js"></script>
    <script src="js/adminOperation.js"></script>
    <script src="js/LogInAdmin.js"></script>
    <script>
        const hamburger = document.getElementById('hamburger');
        const navLinks = document.getElementById('nav-links');

        hamburger.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });
    </script>

</body>

</html>
